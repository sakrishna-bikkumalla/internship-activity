stages:
  - setup
  - lint
  - test
  - build

variables:
  PYTHON_VERSION: "3.13"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"
  UV_HTTP_TIMEOUT: "600"
  UV_HTTP_RETRIES: "10"
  PIP_DEFAULT_TIMEOUT: "120"

default:
  image: python:${PYTHON_VERSION}-slim

cache:
  paths:
    - .uv-cache/

before_script:
  - export VIRTUAL_ENV="$CI_PROJECT_DIR/.venv"
  - export PATH="$VIRTUAL_ENV/bin:$PATH"

setup_job:
  stage: setup
  script:
    - python -V
    - python -m pip install --no-cache-dir --retries 5 "uv==0.11.6"
    - |
      synced=0
      for i in 1 2 3; do
        if uv sync --all-extras --frozen --no-progress; then
          synced=1
          break
        fi
        if [ "$i" -lt 3 ]; then
          echo "uv sync failed, retrying in 5s..."
          sleep 5
        fi
      done
      if [ "$synced" -ne 1 ]; then
        echo "uv sync failed after 3 attempts"
        exit 1
      fi
    - export VIRTUAL_ENV="$CI_PROJECT_DIR/.venv"
    - export PATH="$VIRTUAL_ENV/bin:$PATH"
    - uv tree --frozen > /dev/null
  artifacts:
    paths:
      - .venv/
      - .uv-cache/

lint_job:
  stage: lint
  needs:
    - job: setup_job
  script:
    - uv run ruff check .
    - uv run ruff format --check .

babel_job:
  stage: lint
  needs:
    - job: setup_job
  script:
    - |
      uv run pybabel extract . -o messages.pot
      sed -i '/^"POT-Creation-Date:/d' messages.pot
      if [ -n "$(git status --porcelain messages.pot)" ]; then
        echo "ERROR: messages.pot is outdated. Run: uv run pybabel extract . -o messages.pot, then commit the updated file."
        exit 1
      fi

test_job:
  stage: test
  needs:
    - job: setup_job
  script:
    - uv run pytest --cov=. --cov-report=term --cov-fail-under=80 tests/

mypy:
  stage: test
  needs:
    - job: setup_job
  script:
    - uv run mypy --config-file mypy.ini src/gitlab_compliance_checker app.py

vulture_job:
  stage: test
  needs:
    - job: setup_job
  script:
    - uv run vulture src/gitlab_compliance_checker app.py --min-confidence 100

audit_job:
  stage: test
  needs:
    - job: setup_job
  script:
    - uv audit || true

build_job:
  stage: build
  needs:
    - job: setup_job
  script:
    - uv build
  artifacts:
    paths:
      - dist/
