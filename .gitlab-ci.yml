stages:
  - lint
  - test
  - build

variables:
  PYTHON_VERSION: "3.11"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"
  UV_HTTP_TIMEOUT: "600"
  UV_HTTP_RETRIES: "10"

default:
  image: python:${PYTHON_VERSION}-slim

cache:
  paths:
    - .uv-cache/
    - .cache/pip/

before_script:
  - python -V
  - pip install --no-cache-dir uv
  - |
    for i in {1..3}; do
      uv sync --all-extras --frozen --no-progress && break || (echo "uv sync failed, retrying in 5s..." && sleep 5)
    done
  - rm -rf /tmp/*

lint_job:
  stage: lint
  script:
    - uv run ruff check .
    - uv run ruff format --check .
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "feature-final"

babel_job:
  stage: lint
  script:
    - |
      uv run pybabel extract . -o messages.pot
      sed -i '/^"POT-Creation-Date:/d' messages.pot
      if [ -n "$(git status --porcelain messages.pot)" ]; then
        echo "ERROR: messages.pot is outdated. Run: uv run pybabel extract . -o messages.pot, then commit the updated file."
        exit 1
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "feature-final"

test_job:
  stage: test
  script:
    - uv run pytest tests/
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "feature-final"

mypy:
  stage: test
  script:
    - uv run mypy --config-file mypy.ini gitlab_utils issues modes Projects scripts batch_mode user_profile app.py
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "feature-final"

vulture_job:
  stage: test
  script:
    - uv run vulture gitlab_utils issues modes Projects scripts batch_mode user_profile app.py --min-confidence 100
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "feature-final"

audit_job:
  stage: test
  script:
    - |
      req="0.11.2"
      cur=$(uv --version | cut -d" " -f2)
      if [ "$(printf "%s\n%s" "$req" "$cur" | sort -V | head -n1)" != "$req" ]; then
        echo "ERROR: uv v$cur is installed, but v$req or higher is required."
        exit 1
      fi
    - uv audit || true
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "feature-final"

build_job:
  stage: build
  script:
    - uv build
  artifacts:
    paths:
      - dist/
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "feature-final"
