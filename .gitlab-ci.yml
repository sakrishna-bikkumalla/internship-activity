stages:
  - setup
  - lint
  - test
  - build

variables:
  PYTHON_VERSION: "3.11"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"
  UV_HTTP_TIMEOUT: "600"
  UV_HTTP_RETRIES: "10"

default:
  image: python:${PYTHON_VERSION}-slim

cache:
  paths:
    - .uv-cache/
    - .cache/pip/

before_script:
  - python -V
  - export VIRTUAL_ENV="$CI_PROJECT_DIR/.venv"
  - export PATH="$VIRTUAL_ENV/bin:$PATH"
  - rm -rf /tmp/*

setup_job:
  stage: setup
  script:
    - pip install --no-cache-dir uv
    - |
      for i in {1..3}; do
        uv sync --all-extras --frozen --no-progress && break || (echo "uv sync failed, retrying in 5s..." && sleep 5)
      done
  artifacts:
    paths:
      - .venv/
    expire_in: 1h
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "feature-final"

lint_job:
  stage: lint
  needs:
    - job: setup_job
      artifacts: true
  script:
    - uv run ruff check .
    - uv run ruff format --check .
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "feature-final"

babel_job:
  stage: lint
  needs:
    - job: setup_job
      artifacts: true
  script:
    - |
      uv run pybabel extract . -o messages.pot
      sed -i '/^"POT-Creation-Date:/d' messages.pot
      if [ -n "$(git status --porcelain messages.pot)" ]; then
        echo "ERROR: messages.pot is outdated. Run: uv run pybabel extract . -o messages.pot, then commit the updated file."
        exit 1
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "feature-final"

test_job:
  stage: test
  needs:
    - job: setup_job
      artifacts: true
  script:
    - uv run pytest tests/
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "feature-final"

mypy:
  stage: test
  needs:
    - job: setup_job
      artifacts: true
  script:
    - uv run mypy --config-file mypy.ini gitlab_utils issues modes Projects scripts batch_mode user_profile app.py
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "feature-final"

vulture_job:
  stage: test
  needs:
    - job: setup_job
      artifacts: true
  script:
    - uv run vulture gitlab_utils issues modes Projects scripts batch_mode user_profile app.py --min-confidence 100
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "feature-final"

audit_job:
  stage: test
  needs:
    - job: setup_job
      artifacts: true
  script:
    - uv audit || true
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "feature-final"

build_job:
  stage: build
  needs:
    - job: setup_job
      artifacts: true
  script:
    - uv build
  artifacts:
    paths:
      - dist/
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "feature-final"
