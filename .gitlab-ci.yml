stages:
  - setup
  - lint
  - test
  - build

variables:
  PYTHON_VERSION: "3.13"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"
  UV_HTTP_TIMEOUT: "600"
  UV_HTTP_RETRIES: "10"

default:
  image: python:${PYTHON_VERSION}-slim

cache:
  paths:
    - .uv-cache/

before_script:
  - python -V
  - pip install --no-cache-dir uv
  - |
    for i in {1..3}; do
      uv sync --all-extras --frozen --no-progress && break || (echo "uv sync failed, retrying in 5s..." && sleep 5)
    done
  - export VIRTUAL_ENV="$CI_PROJECT_DIR/.venv"
  - export PATH="$VIRTUAL_ENV/bin:$PATH"

setup_job:
  stage: setup
  script:
    - pip install --no-cache-dir uv
    - |
      for i in {1..3}; do
        uv sync --all-extras --frozen --no-progress && break || (echo "uv sync failed, retrying in 5s..." && sleep 5)
      done

lint_job:
  stage: lint
  needs:
    - job: setup_job
  script:
    - uv run ruff check .
    - uv run ruff format --check .

babel_job:
  stage: lint
  needs:
    - job: setup_job
  script:
    - |
      uv run pybabel extract . -o messages.pot
      sed -i '/^"POT-Creation-Date:/d' messages.pot
      if [ -n "$(git status --porcelain messages.pot)" ]; then
        echo "ERROR: messages.pot is outdated. Run: uv run pybabel extract . -o messages.pot, then commit the updated file."
        exit 1
      fi

test_job:
  stage: test
  needs:
    - job: setup_job
  script:
    - uv run pytest --cov=. --cov-report=term --cov-fail-under=80 tests/

mypy:
  stage: test
  needs:
    - job: setup_job
  script:
    - uv run mypy --config-file mypy.ini src/gitlab_compliance_checker app.py

vulture_job:
  stage: test
  needs:
    - job: setup_job
  script:
    - uv run vulture src/gitlab_compliance_checker app.py --min-confidence 100

audit_job:
  stage: test
  needs:
    - job: setup_job
  script:
    - uv audit || true

build_job:
  stage: build
  needs:
    - job: setup_job
  script:
    - uv build
  artifacts:
    paths:
      - dist/
