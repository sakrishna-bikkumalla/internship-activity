# Pre-commit hooks configuration for gitlab-compliance-checker
# Automatically runs checks before each commit to catch issues early
# Matches the linting stage in .gitlab-ci.yml

exclude: '^assets/badges/|^.venv/'

repos:
  # Ruff linting (matches: uv run ruff check .)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.5
    hooks:
      - id: ruff
        args: ['--fix']
        name: Ruff lint
      # Ruff formatting (matches: uv run ruff format --check .)
      - id: ruff-format
        name: Ruff format

  # Local type checking via the project's uv environment
  - repo: local
    hooks:
      - id: mypy
        name: Mypy type check
        entry: uv run mypy --config-file mypy.ini .
        language: system
        pass_filenames: false
        types: [python]

  # General file quality checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of file
      - id: check-yaml
        name: Check YAML syntax
      - id: check-added-large-files
        args: ['--maxkb=1000']
        name: Detect large files
      - id: check-merge-conflict
        name: Check merge conflicts
      - id: detect-private-key
        name: Detect private keys

  # Vulture dead code detection
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.11
    hooks:
      - id: vulture
        name: Vulture
        entry: uv run vulture gitlab_utils/ modes/ user_profile/ batch_mode/ issues/ Projects/ app.py
        language: system
        pass_filenames: false

ci:
  autofix_commit_msg: '[pre-commit.ci] auto fixes from pre-commit hooks'
  autofix_prs: true
  autoupdate_schedule: weekly
