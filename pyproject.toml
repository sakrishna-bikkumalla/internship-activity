[project]
name = "gitlab-compliance-checker"
version = "0.1.0"
description = "A Python tool to check GitLab project compliance with predefined rules."
authors = [
  { name = "Lokesh Manchala", email = "manchalalokesh2003@gmail.com" }
]
readme = "README.md"
license = { text = "GNU Affero General Public License v3.0" }
requires-python = ">=3.11"
dependencies = [
  "streamlit>=1.33.0",
  "xlsxwriter",
  "aiohttp",
  "nest_asyncio",
  "python-gitlab",
  "python-dotenv",
  "plotly"
]

[project.optional-dependencies]
dev = [
  "ruff",
  "mypy",
  "types-python-dateutil",
  "pytest",
  "pytest-asyncio",
  "aioresponses",
  "pre-commit",
  "openpyxl"
]

[tool.hatch.build]
packages = ["gitlab_utils", "modes", "batch_mode", "user_profile", "views", "issues"]
include = [
  "README.md",
  "LICENSE",
  "CHANGELOG.md",
  "CONTRIBUTING.md",
  "CODE_OF_CONDUCT.md",
  "assets/*"
]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "C", "B"]
ignore = ["E501", "C901", "E701", "N806", "B904", "N999"]
# exclude = ["tests/*"]


[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q"
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"

[project.urls]
"Homepage" = "https://code.swecha.org/tools/gitlab-compliance-checker"
"Issue Tracker" = "https://code.swecha.org/tools/gitlab-compliance-checker/-/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "mypy>=1.18.2",
    "openpyxl>=3.1.5",
    "pytest-asyncio>=1.3.0",
    "types-python-dateutil>=2.9.0.20250516",
]

[tool.vulture]
exclude = ["*__init__.py", "tests/", "migrations/"]
min_confidence = 80
paths = ["."]
